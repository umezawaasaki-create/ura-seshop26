<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css?v=17">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <button id="menu-btn" class="menu-btn" onclick="openTeamMenu()" aria-label="チーム一覧管理">
        <span class="menu-btn-icon">&#9776;</span><span class="menu-btn-label">チーム一覧管理</span>
      </button>
      <h1><img class="title-img" src="title.svg" alt="KNOCKOUT STAGE ROUND 16"></h1>
      <button id="refresh-btn" class="btn btn-ghost" onclick="loadData()">
        <span class="refresh-btn-full">最新データ更新</span><span class="refresh-btn-short">更新</span>
      </button>
      <p class="auto-refresh-note">20秒ごとに自動更新</p>
    </header>

    <main id="bracket-wrap" class="bracket-wrap">
      <div id="bracket-scale-wrap">
        <div id="bracket" class="bracket">
          <div class="loading">読み込み中...</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <!-- 試合編集モーダル -->
  <div id="modal-backdrop" class="modal-backdrop" hidden onclick="if(event.target===this) closeModal()">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" onclick="closeModal()" aria-label="閉じる">&times;</button>
      <h2 id="modal-title">対戦カード</h2>
      <p id="modal-round" class="modal-round"></p>

      <section class="modal-section">
        <h3>日時・グラウンド</h3>
        <div class="form-row">
          <label>日付
            <input type="date" id="input-date">
          </label>
          <label>時刻
            <input type="time" id="input-time">
          </label>
        </div>
        <div class="form-row">
          <label class="grow">グラウンド
            <input type="text" id="input-venue" placeholder="例: 世田谷区立総合運動場">
          </label>
        </div>
        <button class="btn btn-primary" onclick="submitSchedule()">日程を保存</button>
      </section>

      <section class="modal-section">
        <h3>試合結果</h3>
        <div id="score-fields" class="form-row">
          <label>
            <span id="score-team1-label">チーム1</span>
            <input type="number" id="input-score1" min="0" step="1">
          </label>
          <span class="vs">-</span>
          <label>
            <span id="score-team2-label">チーム2</span>
            <input type="number" id="input-score2" min="0" step="1">
          </label>
        </div>
        <button id="result-save-btn" class="btn btn-primary" onclick="submitResult()">結果を保存</button>
        <div class="fusen-row">
          <button class="btn btn-outline" id="fusen1-btn" onclick="submitFusen(1)"></button>
          <button class="btn btn-outline" id="fusen2-btn" onclick="submitFusen(2)"></button>
        </div>
        <p id="score-disabled-note" class="note" hidden>対戦チームが両方確定してから結果を入力できます。</p>
        <button id="clear-result-btn" class="btn btn-danger-outline" onclick="submitClearResult()" hidden>結果の取り消し</button>
      </section>
    </div>
  </div>

  <!-- チーム一覧（ハンバーガーメニュー） -->
  <div id="team-menu-backdrop" class="modal-backdrop" hidden onclick="if(event.target===this) closeTeamMenu()">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" onclick="closeTeamMenu()" aria-label="閉じる">&times;</button>
      <h2>チーム一覧</h2>
      <div id="team-menu-list" class="team-menu-list"></div>
    </div>
  </div>

  <!-- チームアイコン変更モーダル -->
  <div id="icon-modal-backdrop" class="modal-backdrop" hidden onclick="if(event.target===this) closeIconModal()">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" onclick="closeIconModal()" aria-label="閉じる">&times;</button>
      <h2 id="icon-modal-team-name">チーム名</h2>
      <div class="icon-modal-preview">
        <span id="icon-modal-preview"></span>
      </div>
      <div class="icon-modal-actions">
        <button type="button" class="btn btn-outline btn-small" onclick="triggerIconUploadForCurrentTeam()">画像を選択</button>
        <button type="button" class="btn btn-text btn-small" onclick="resetCurrentTeamIcon()">元に戻す</button>
      </div>
      <input type="file" id="icon-modal-file" accept="image/*" hidden onchange="onIconModalFileSelected(event)">
    </div>
  </div>

  <script src="script.js?v=19"></script>
</body>
</html>
